  <rect x="510" y="180" width="56" height="56" rx="12" fill="url(#fp-og-grad)"/>
  <path d="M522 195 L522 225 M522 195 L538 195 Q546 195 546 205 Q546 215 538 215 L522 215 M534 215 L546 225" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="550" cy="195" r="4" fill="#ffffff"/>
